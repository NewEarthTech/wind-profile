name: Release

# Publishes to crates.io when a v* tag is pushed, using crates.io Trusted
# Publishing (OIDC) - there is no stored registry token. Also cuts a GitHub
# Release with auto-generated notes.
#
# To release:
#   1. bump `version` in Cargo.toml and add a CHANGELOG.md entry
#   2. commit and merge to main
#   3. git tag vX.Y.Z && git push origin vX.Y.Z
# The tag push triggers this workflow. (Trusted Publishing is configured on
# crates.io for this repository + this workflow file.)

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC for crates.io Trusted Publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@stable

      - name: Tag must match Cargo.toml version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $manifest"; exit 1
          fi

      - name: Test before publishing
        run: cargo test

      - name: Mint a short-lived crates.io token (OIDC Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes
